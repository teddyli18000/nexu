name: Contribution Pool Health Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  pool-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'good-first-issue',
              per_page: 100,
            });

            const unassigned = issues.filter(i => !i.assignee && !i.pull_request);

            const { data: intermediateIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'intermediate',
              per_page: 100,
            });

            const { data: advancedIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'advanced',
              per_page: 100,
            });

            const gfiCount = unassigned.length;
            const totalPool = gfiCount
              + intermediateIssues.filter(i => !i.assignee && !i.pull_request).length
              + advancedIssues.filter(i => !i.assignee && !i.pull_request).length;

            const MIN_GFI = 10;

            console.log(`=== Contribution Pool Health ===`);
            console.log(`Good First Issues (unassigned): ${gfiCount}`);
            console.log(`Intermediate (unassigned): ${intermediateIssues.filter(i => !i.assignee).length}`);
            console.log(`Advanced (unassigned): ${advancedIssues.filter(i => !i.assignee).length}`);
            console.log(`Total pool: ${totalPool}`);

            if (gfiCount < MIN_GFI) {
              console.log(`⚠️ WARNING: Only ${gfiCount} good-first-issues available (minimum: ${MIN_GFI})`);
              console.log(`Action needed: sync with dev team to add more contribution tasks`);

              // Find or create the tracking issue
              const { data: trackingIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'ci-automation',
                creator: 'github-actions[bot]',
                per_page: 5,
              });

              const existingTracking = trackingIssues.find(i =>
                i.title.includes('Contribution Pool')
              );

              const body = [
                `## Contribution Pool Alert`,
                ``,
                `The contribution pool is below the minimum threshold.`,
                ``,
                `| Metric | Current | Target |`,
                `|--------|---------|--------|`,
                `| Good First Issues | ${gfiCount} | ≥ ${MIN_GFI} |`,
                `| Total Pool | ${totalPool} | — |`,
                ``,
                `**Action needed**: Sync with the dev team to add more \`good-first-issue\` tasks.`,
                ``,
                `Suggested areas to add tasks:`,
                `- Documentation improvements`,
                `- i18n / translation`,
                `- CSS / UI polish fixes`,
                `- Test coverage`,
                `- Small bug fixes`,
                ``,
                `_This issue is auto-generated by the Contribution Pool Health Check workflow._`,
              ].join('\n');

              if (existingTracking) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingTracking.number,
                  body: body,
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `⚠️ Contribution Pool Below Minimum (${gfiCount}/${MIN_GFI} GFIs)`,
                  body: body,
                  labels: ['ci-automation'],
                });
              }
            }
