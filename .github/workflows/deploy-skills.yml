name: Deploy Skills

on:
  push:
    branches: [main]
    paths: ["skills/nexubot/**"]
  workflow_dispatch:
    inputs:
      skill_name:
        description: "Skill name to deploy (leave empty for all)"
        required: false

permissions:
  contents: read

concurrency:
  group: deploy-skills
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect changed skills
        id: detect
        run: |
          if [ -n "${{ inputs.skill_name }}" ]; then
            echo "skills=${{ inputs.skill_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- skills/nexubot/ \
            | cut -d/ -f3 | sort -u | tr '\n' ' ')
          echo "skills=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Deploy changed skills
        if: steps.detect.outputs.skills != ''
        env:
          NEXU_API_URL: ${{ vars.NEXU_API_URL }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          for skill in ${{ steps.detect.outputs.skills }}; do
            echo "::group::Deploying $skill"
            bash skills/scripts/push-skill.sh "$skill"
            echo "::endgroup::"
          done
