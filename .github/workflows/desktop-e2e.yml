name: Desktop E2E

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'E2E mode'
        required: false
        default: 'model'
        type: choice
        options: [smoke, login, model, update, resilience, full]
      source:
        description: 'Artifact source'
        required: false
        default: 'download'
        type: choice
        options:
          - download   # Download published build (nightly/beta/stable)
          - build      # Build unsigned from current branch
      channel:
        description: 'Channel (only for download source)'
        required: false
        default: 'nightly'
        type: choice
        options: [nightly, beta, stable]
  schedule:
    # Run nightly at 03:00 UTC (11:00 CST)
    - cron: '0 3 * * *'

env:
  RELEASE_BASE: https://desktop-releases.nexu.io

jobs:
  # --------------------------------------------------------------------------
  # Option A: Build unsigned from current branch
  # --------------------------------------------------------------------------
  build:
    if: github.event.inputs.source == 'build'
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build unsigned desktop (arm64)
        run: pnpm dist:mac:unsigned:arm64

      - name: Copy build artifacts to E2E
        run: |
          mkdir -p e2e/desktop/artifacts
          rm -f e2e/desktop/artifacts/*.dmg e2e/desktop/artifacts/*.zip
          cp apps/desktop/release/*.dmg e2e/desktop/artifacts/
          cp apps/desktop/release/*.zip e2e/desktop/artifacts/
          echo "Artifacts:"
          ls -lh e2e/desktop/artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-build-${{ github.run_id }}
          path: e2e/desktop/artifacts/
          retention-days: 3

  # --------------------------------------------------------------------------
  # E2E test
  # --------------------------------------------------------------------------
  e2e:
    needs: [build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: e2e/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install E2E dependencies
        run: npm install

      # --- Download source ---
      - name: Download published artifacts
        if: github.event.inputs.source != 'build'
        env:
          CHANNEL: ${{ github.event.inputs.channel || 'nightly' }}
          NEXU_DESKTOP_E2E_DMG_URL: ${{ env.RELEASE_BASE }}/${{ github.event.inputs.channel || 'nightly' }}/arm64/nexu-latest-${{ github.event.inputs.channel || 'nightly' }}-mac-arm64.dmg
          NEXU_DESKTOP_E2E_ZIP_URL: ${{ env.RELEASE_BASE }}/${{ github.event.inputs.channel || 'nightly' }}/arm64/nexu-latest-${{ github.event.inputs.channel || 'nightly' }}-mac-arm64.zip
        run: |
          echo "Channel: $CHANNEL"
          npm run download

      # --- Build source ---
      - name: Download build artifacts
        if: github.event.inputs.source == 'build'
        uses: actions/download-artifact@v4
        with:
          name: desktop-e2e-build-${{ github.run_id }}
          path: e2e/desktop/artifacts/

      - name: Verify artifacts
        run: |
          echo "Artifacts:"
          ls -lh artifacts/
          test -f artifacts/*.dmg || { echo "ERROR: No DMG found"; exit 1; }
          test -f artifacts/*.zip || { echo "ERROR: No ZIP found"; exit 1; }

      - name: Run desktop E2E
        env:
          NEXU_DESKTOP_E2E_SKIP_CODESIGN: ${{ github.event.inputs.source == 'build' && 'true' || 'false' }}
        run: bash scripts/run-e2e.sh "${{ github.event.inputs.mode || 'model' }}"

      - name: Upload E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-e2e-${{ github.event.inputs.source || 'download' }}-${{ github.event.inputs.channel || 'nightly' }}-${{ github.event.inputs.mode || 'model' }}-${{ github.run_id }}
          path: |
            e2e/desktop/captures/
          if-no-files-found: warn
          retention-days: 14

      - name: Notify Feishu E2E result
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.NIGHTLY_FEISHU_WEBHOOK }}
          E2E_MODE: ${{ github.event.inputs.mode || 'model' }}
          E2E_SOURCE: ${{ github.event.inputs.source || 'download' }}
          E2E_CHANNEL: ${{ github.event.inputs.channel || 'nightly' }}
          E2E_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$FEISHU_WEBHOOK" ]; then
            echo "No Feishu webhook, skipping"
            exit 0
          fi

          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          short_sha="${GITHUB_SHA::7}"
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          trigger="${GITHUB_TRIGGERING_ACTOR:-unknown}"

          if [ "$E2E_STATUS" = "success" ]; then
            template="green"
            title="✅ Desktop E2E 测试通过"
          else
            template="red"
            title="❌ Desktop E2E 测试失败"
          fi

          # Determine what triggered this: PR, commit, or scheduled
          trigger_info=""
          if [ -n "$GITHUB_HEAD_REF" ]; then
            pr_number=$(echo "$GITHUB_REF" | grep -oE '[0-9]+' || echo "")
            trigger_info="PR [#${pr_number}](https://github.com/${{ github.repository }}/pull/${pr_number}) on \`${branch}\`"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            trigger_info="定时触发 (\`${branch}\` @ \`${short_sha}\`)"
          else
            trigger_info="手动触发 (\`${branch}\` @ \`${short_sha}\`)"
          fi

          card=$(jq -n \
            --arg title "$title" \
            --arg template "$template" \
            --arg mode "$E2E_MODE" \
            --arg source "$E2E_SOURCE" \
            --arg channel "$E2E_CHANNEL" \
            --arg trigger_info "$trigger_info" \
            --arg trigger "$trigger" \
            --arg run_url "$run_url" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  template: $template,
                  title: {
                    tag: "plain_text",
                    content: $title
                  }
                },
                elements: [
                  {
                    tag: "markdown",
                    content: ("**触发来源**\n" + $trigger_info + "\n触发人: " + $trigger + "\n\n**测试配置**\n- 模式: `" + $mode + "`\n- 构建来源: `" + $source + "`\n- 频道: `" + $channel + "`")
                  },
                  {
                    tag: "action",
                    actions: [
                      {
                        tag: "button",
                        text: { tag: "plain_text", content: "📋 查看详情" },
                        type: "default",
                        url: $run_url
                      }
                    ]
                  }
                ]
              }
            }')

          curl -sf -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$card" || echo "Feishu notification failed (non-fatal)"
