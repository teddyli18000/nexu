name: Desktop Nightly (Test)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"

concurrency:
  group: desktop-nightly-test
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/desktop-build.yml
    with:
      environment: test
      cloud_url: "https://nexu.powerformer.net"
      link_url: "https://nexu-link.powerformer.net"
      release_tag: desktop-nightly-test
      release_name: "Nexu Desktop Nightly (Test)"
      artifact_suffix: "-test"
    secrets: inherit
