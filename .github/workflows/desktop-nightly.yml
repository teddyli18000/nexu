name: Desktop Nightly (Prod)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: desktop-nightly-prod
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/desktop-build.yml
    with:
      environment: prod
      cloud_url: "https://nexu.io"
      link_url: "https://link.nexu.io"
      update_feed_url: "https://desktop-releases.nexu.io/nightly"
      build_source: "nightly-prod"
      release_tag: desktop-nightly
      release_name: "Nexu Desktop Nightly"
      artifact_suffix: ""
    secrets: inherit
