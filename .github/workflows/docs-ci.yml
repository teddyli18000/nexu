name: Docs CI

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs-ci.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm build
