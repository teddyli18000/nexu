apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nexu.configMapName" . }}
  namespace: {{ include "nexu.namespace" . }}
  labels:
    {{- include "nexu.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if .Values.gateway.sandbox.enabled }}
  RUNTIME_API_BASE_URL: {{ (get .Values.config "NEXU_API_URL" | default (printf "http://%s:%v" (include "nexu.api.fullname" .) .Values.api.service.port)) | quote }}
  SANDBOX_ENABLED: "true"
  SANDBOX_IMAGE: {{ .Values.gateway.sandbox.sandboxImage | quote }}
  {{- end }}
