apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nexu.gateway.fullname" . }}
  namespace: {{ include "nexu.namespace" . }}
  labels:
    {{- include "nexu.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  serviceName: {{ include "nexu.gateway.fullname" . }}
  ordinals:
    start: 1
  {{- if not .Values.gateway.hpa.enabled }}
  replicas: {{ .Values.gateway.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nexu.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "nexu.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "nexu.fullname" .) }}
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: gateway
              containerPort: {{ .Values.gateway.service.port }}
              protocol: TCP
          env:
            - name: RUNTIME_API_BASE_URL
              value: {{ (get .Values.config "NEXU_API_URL" | default (printf "http://%s:%v" (include "nexu.api.fullname" .) .Values.api.service.port)) | quote }}
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexu.secretName" . }}
                  key: INTERNAL_API_TOKEN
            - name: SKILL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexu.secretName" . }}
                  key: SKILL_API_TOKEN
            - name: ORDINAL
              valueFrom:
                fieldRef:
                  fieldPath: "metadata.labels['apps.kubernetes.io/pod-index']"
            - name: RUNTIME_POOL_ID
              value: gateway_pool_$(ORDINAL)
            - name: RUNTIME_MANAGE_OPENCLAW_PROCESS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "nexu.configMapName" . }}
                  key: RUNTIME_MANAGE_OPENCLAW_PROCESS
                  optional: true
            - name: RUNTIME_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: OPENCLAW_CONFIG_PATH
              value: /etc/openclaw/config.json
            - name: OPENCLAW_STATE_DIR
              value: /data/openclaw
            {{- if .Values.gateway.sandbox.enabled }}
            - name: SANDBOX_ENABLED
              value: "true"
            - name: SANDBOX_IMAGE
              value: {{ .Values.gateway.sandbox.sandboxImage | quote }}
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
            {{- end }}
          volumeMounts:
            - name: openclaw-config
              mountPath: /etc/openclaw
            - name: openclaw-data
              mountPath: /data/openclaw
            # Mount PVC logs/ subdir at OpenClaw's default log path so
            # daily-rolling logs (openclaw-YYYY-MM-DD.log) persist on the
            # PVC with automatic 24h pruning.
            - name: openclaw-data
              mountPath: /tmp/openclaw
              subPath: logs
          startupProbe:
            exec:
              command:
                - openclaw
                - health
                - --json
                - --timeout
                - {{ .Values.gateway.probes.cliTimeoutMs | quote }}
            periodSeconds: {{ .Values.gateway.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.gateway.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.gateway.probes.startup.failureThreshold }}
          readinessProbe:
            exec:
              command:
                - openclaw
                - health
                - --json
                - --timeout
                - {{ .Values.gateway.probes.cliTimeoutMs | quote }}
            periodSeconds: {{ .Values.gateway.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.gateway.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.gateway.probes.readiness.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
        {{- if .Values.gateway.sandbox.enabled }}
        - name: dind
          image: {{ .Values.gateway.sandbox.dindImage | quote }}
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              DNS_IP=$(awk '/^nameserver/ {print $2; exit}' /etc/resolv.conf)
              DNS_IP="${DNS_IP:-8.8.8.8}"
              mkdir -p /etc/docker
              printf '{"dns":["%s"]}\n' "$DNS_IP" > /etc/docker/daemon.json
              exec dockerd-entrypoint.sh dockerd \
                --host=tcp://0.0.0.0:2375 \
                --host=unix:///var/run/docker.sock \
                --tls=false
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          startupProbe:
            exec:
              command: ["docker", "info"]
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 15
          livenessProbe:
            exec:
              command: ["docker", "info"]
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: docker-data
              mountPath: /var/lib/docker
            - name: openclaw-data
              mountPath: /data/openclaw
            {{- if .Values.gateway.sandbox.ecr.enabled }}
            - name: docker-config
              mountPath: /root/.docker
            {{- end }}
          resources:
            {{- toYaml .Values.gateway.sandbox.dindResources | nindent 12 }}
        {{- if .Values.gateway.sandbox.ecr.enabled }}
        # ECR credential refresher sidecar
        # Generates docker config.json with ECR credentials and refreshes every 6 hours
        # Requires IRSA: serviceAccount must have eks.amazonaws.com/role-arn annotation
        # with a role that has ecr:GetAuthorizationToken permission
        - name: ecr-refresher
          image: {{ .Values.gateway.sandbox.ecr.image | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              ECR_REGISTRY="{{ .Values.gateway.sandbox.ecr.registry }}"
              REGION="{{ .Values.gateway.sandbox.ecr.region }}"
              SANDBOX_IMAGE="{{ .Values.gateway.sandbox.sandboxImage }}"
              REFRESH_INTERVAL={{ .Values.gateway.sandbox.ecr.refreshIntervalSeconds | default 21600 }}

              refresh_ecr_token() {
                echo "$(date -Iseconds) Refreshing ECR token for $ECR_REGISTRY..."
                TOKEN=$(aws ecr get-login-password --region "$REGION")
                if [ -z "$TOKEN" ]; then
                  echo "$(date -Iseconds) ERROR: Failed to get ECR token"
                  return 1
                fi
                AUTH=$(echo -n "AWS:$TOKEN" | base64 | tr -d '\n')
                mkdir -p /docker-config
                cat > /docker-config/config.json <<EOF
              {
                "auths": {
                  "$ECR_REGISTRY": {
                    "auth": "$AUTH"
                  }
                }
              }
              EOF
                echo "$(date -Iseconds) ECR token refreshed successfully"
              }

              prepull_sandbox_image() {
                echo "$(date -Iseconds) Waiting for Docker daemon..."
                until docker info >/dev/null 2>&1; do
                  sleep 2
                done
                echo "$(date -Iseconds) Pre-pulling sandbox image: $SANDBOX_IMAGE"
                if docker pull "$SANDBOX_IMAGE"; then
                  echo "$(date -Iseconds) Sandbox image pulled successfully"
                else
                  echo "$(date -Iseconds) WARNING: Failed to pull sandbox image"
                fi
              }

              # Initial token refresh
              refresh_ecr_token

              # Pre-pull sandbox image in background
              prepull_sandbox_image &

              # Refresh loop
              while true; do
                sleep "$REFRESH_INTERVAL"
                refresh_ecr_token || true
              done
          env:
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.gateway.sandbox.ecr.region | quote }}
          volumeMounts:
            - name: docker-config
              mountPath: /docker-config
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
        {{- end }}
        {{- end }}
      volumes:
        - name: openclaw-config
          emptyDir: {}
        {{- if and .Values.gateway.sandbox.enabled .Values.gateway.sandbox.ecr.enabled }}
        - name: docker-config
          emptyDir: {}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: openclaw-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: {{ .Values.gateway.persistence.size | default "20Gi" }}
    - metadata:
        name: docker-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: {{ .Values.gateway.sandbox.dindStorageSize | default "10Gi" }}
