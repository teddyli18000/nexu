apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-pool
  labels:
    app.kubernetes.io/name: gateway-pool
    app.kubernetes.io/part-of: nexu
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-pool
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-pool
        app.kubernetes.io/part-of: nexu
        app.kubernetes.io/component: gateway
    spec:
      initContainers:
        - name: fetch-config
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              MAX_RETRIES=30
              attempt=0
              while [ "$attempt" -lt "$MAX_RETRIES" ]; do
                status=$(curl -s -o /etc/openclaw/config.json -w "%{http_code}" \
                  -H "x-internal-token: $(INTERNAL_API_TOKEN)" \
                  "${NEXU_API_URL}/api/internal/pools/${POOL_ID}/config")
                if [ "$status" = "200" ]; then
                  echo "Config fetched."
                  exit 0
                fi
                attempt=$((attempt + 1))
                echo "Attempt ${attempt}/${MAX_RETRIES} (HTTP ${status}), retrying..."
                sleep 2
              done
              echo "Failed to fetch config."
              exit 1
          envFrom:
            - configMapRef:
                name: nexu-config
            - secretRef:
                name: nexu-secrets
          env:
            - name: POOL_ID
              valueFrom:
                configMapKeyRef:
                  name: nexu-config
                  key: POOL_ID
                  optional: true
          volumeMounts:
            - name: openclaw-config
              mountPath: /etc/openclaw
      containers:
        - name: gateway
          image: nexu-gateway:latest
          ports:
            - containerPort: 18789
              protocol: TCP
          env:
            - name: NEXU_API_URL
              valueFrom:
                configMapKeyRef:
                  name: nexu-config
                  key: NEXU_API_URL
            - name: GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nexu-secrets
                  key: GATEWAY_TOKEN
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nexu-secrets
                  key: INTERNAL_API_TOKEN
            - name: SKILL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nexu-secrets
                  key: SKILL_API_TOKEN
            - name: POOL_ID
              valueFrom:
                configMapKeyRef:
                  name: nexu-config
                  key: POOL_ID
                  optional: true
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: OPENCLAW_CONFIG_PATH
              value: /etc/openclaw/config.json
          volumeMounts:
            - name: openclaw-config
              mountPath: /etc/openclaw
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: openclaw-config
          emptyDir: {}
